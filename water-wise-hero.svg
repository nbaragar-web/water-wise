<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Water wise illustration</title>
  <desc id="desc">A faucet with a single water droplet above a cupped hand and a leaf, representing mindful water use.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f7ff"/>
      <stop offset="100%" stop-color="#f2fff4"/>
    </linearGradient>
    <linearGradient id="drop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fd3ff"/>
      <stop offset="100%" stop-color="#1b87ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- Soft waves -->
  <path d="M0 520 C200 480, 400 560, 600 520 C800 480, 1000 560, 1200 520 L1200 700 L0 700 Z" fill="#dff4ff"/>
  <path d="M0 565 C200 530, 400 600, 600 565 C800 530, 1000 600, 1200 565 L1200 700 L0 700 Z" fill="#cfeeff"/>

  <!-- Faucet -->
  <g transform="translate(180 140)">
    <rect x="0" y="0" width="360" height="70" rx="20" fill="#2c5e7a"/>
    <rect x="290" y="40" width="140" height="60" rx="18" fill="#2c5e7a"/>
    <rect x="320" y="90" width="80" height="90" rx="20" fill="#2c5e7a"/>
    <rect x="120" y="-40" width="120" height="40" rx="12" fill="#2c5e7a"/>
    <circle cx="180" cy="-20" r="28" fill="#4f89a8"/>
    <circle cx="180" cy="-20" r="12" fill="#e9f7ff"/>
  </g>

  <!-- Droplet -->
  <path d="M540 330 C540 270, 600 230, 600 190 C600 230, 660 270, 660 330 C660 380, 620 420, 600 430 C580 420, 540 380, 540 330 Z" fill="url(#drop)"/>

  <!-- Hand -->
  <g transform="translate(360 380)">
    <path d="M80 140 C170 60, 300 40, 420 70 C500 90, 560 130, 610 190 C540 210, 460 230, 380 250 C250 280, 170 260, 80 210 Z" fill="#f4c7a1"/>
    <path d="M120 150 C210 110, 320 100, 420 120" stroke="#e1ab82" stroke-width="10" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Leaf -->
  <g transform="translate(720 360)">
    <path d="M0 120 C80 20, 200 0, 300 40 C260 160, 140 220, 20 210 C10 190, 0 160, 0 120 Z" fill="#46c06f"/>
    <path d="M40 170 C120 130, 190 90, 250 50" stroke="#2f8f4f" stroke-width="8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Caption -->
  <text x="80" y="650" font-family="'Segoe UI', Arial, sans-serif" font-size="42" fill="#2c5e7a" font-weight="600">Be water wise — every drop counts</text>
</svg>
